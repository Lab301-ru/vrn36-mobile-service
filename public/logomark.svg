<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VRN-36">
  <defs>
    <linearGradient id="vrnEdge" x1="32" y1="6" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="vrnVector" x1="20" y1="22" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5F3FC"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="vrnGlow" cx="0.5" cy="0.46" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- contained backlight -->
  <circle cx="32" cy="30" r="20" fill="url(#vrnGlow)"/>

  <!-- outer engineered hexagon -->
  <path d="M32 4 54.27 17 54.27 43 32 56 9.73 43 9.73 17Z" fill="#0B0F17" stroke="url(#vrnEdge)" stroke-width="1.5"/>
  <!-- inner hairline frame -->
  <path d="M32 11 48.27 20.5 48.27 39.5 32 49 15.73 39.5 15.73 20.5Z" fill="none" stroke="#243047" stroke-width="1"/>

  <!-- precision tick marks at the six vertices' axes -->
  <g stroke="#243047" stroke-width="1" stroke-linecap="round" opacity="0.9">
    <path d="M32 5.6 32 9"/>
    <path d="M32 51 32 54.4"/>
  </g>

  <!-- the live vector: a charged "V" (VRN) -->
  <path d="M22 23 L32 41 L42 23" fill="none" stroke="url(#vrnVector)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- node at the contact point -->
  <circle cx="32" cy="41" r="2.4" fill="#A5F3FC"/>
  <circle cx="32" cy="41" r="4.6" fill="none" stroke="#22D3EE" stroke-opacity="0.5" stroke-width="1"/>
</svg>
