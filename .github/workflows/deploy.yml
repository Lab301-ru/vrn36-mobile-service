name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, необходимые для публикации на GitHub Pages из Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускаем параллельные деплои: новый push отменяет предыдущий незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Версия pnpm берётся из поля "packageManager" в package.json.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        # Node 22+: нужен нативный WebSocket для @supabase/supabase-js
        # (на Node 20 createClient падает → посты блога не подтягивались).
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # Параметры Supabase (проект блога) вшиты как значения по умолчанию
        # в src/lib/supabase.ts и scripts/generate-sitemap.ts — это публичные
        # URL и publishable-ключ, доступ к данным ограничивает RLS. Поэтому
        # секреты сборке не нужны.
        run: pnpm build

      - name: SPA fallback for client-side routing
        # GitHub Pages не умеет SPA-rewrite (в отличие от vercel.json), поэтому
        # копируем index.html в 404.html — прямые переходы на /blog/* отдают приложение.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
