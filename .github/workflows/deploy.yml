name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, необходимые для публикации на GitHub Pages из Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускаем параллельные деплои: новый push отменяет предыдущий незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Ключи Supabase читаются на этапе сборки (блог, sitemap, админка).
          # Заданы в Settings → Secrets and variables → Actions.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: SPA fallback for client-side routing
        # GitHub Pages не умеет SPA-rewrite (в отличие от vercel.json), поэтому
        # копируем index.html в 404.html — прямые переходы на /blog/* отдают приложение.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
